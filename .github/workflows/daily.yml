name: 데일리 테제 자동 발행

on:
  schedule:
    - cron: '0 23 * * 0-4'  # KST 08:00 월~금 (경제+정치+컬처)
    - cron: '0 6 * * 1-5'   # KST 15:00 월~금 (경제만)
    - cron: '0 9 * * 5'     # KST 18:00 금요일 (주간 다이제스트)
  workflow_dispatch:
    inputs:
      topic:
        description: '발행할 토픽 (economy / politics / culture / all / weekly)'
        required: false
        default: 'all'

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: 레포 체크아웃
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Python 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 의존성 설치
        run: echo "표준 라이브러리만 사용 — 추가 패키지 불필요"

      - name: git 사용자 설정
        run: |
          git config user.name "jayce0321"
          git config user.email "jaehoyi0321@gmail.com"

      # ── 경제·투자 (08:00 + 15:00 모두 실행) ───────────────────
      - name: 경제·투자 테제 생성
        if: >
          github.event_name == 'workflow_dispatch' && (
            github.event.inputs.topic == 'all' ||
            github.event.inputs.topic == 'economy' ||
            github.event.inputs.topic == ''
          ) ||
          github.event_name == 'schedule' && github.event.schedule != '0 9 * * 5'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
          ECOS_API_KEY: ${{ secrets.ECOS_API_KEY }}
          INDEXNOW_KEY: ${{ secrets.INDEXNOW_KEY }}
          GA4_ID: ${{ secrets.GA4_ID }}
          BING_VERIFY_KEY: ${{ secrets.BING_VERIFY_KEY }}
          TOPIC: economy
        run: python daily_auto.py

      - name: 경제·투자 커밋 & 푸시
        if: >
          github.event_name == 'workflow_dispatch' && (
            github.event.inputs.topic == 'all' ||
            github.event.inputs.topic == 'economy' ||
            github.event.inputs.topic == ''
          ) ||
          github.event_name == 'schedule' && github.event.schedule != '0 9 * * 5'
        run: |
          git add -A
          git diff --staged --quiet || git commit -m "경제·투자 데일리 테제 $(date +'%Y.%m.%d %H:%M') [자동]"
          git push

      # ── 정치 (08:00만 실행) ────────────────────────────────────
      - name: 정치 테제 생성
        if: >
          github.event_name == 'workflow_dispatch' && (
            github.event.inputs.topic == 'all' ||
            github.event.inputs.topic == 'politics'
          ) ||
          github.event.schedule == '0 23 * * 0-4'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          INDEXNOW_KEY: ${{ secrets.INDEXNOW_KEY }}
          GA4_ID: ${{ secrets.GA4_ID }}
          BING_VERIFY_KEY: ${{ secrets.BING_VERIFY_KEY }}
          TOPIC: politics
        run: python daily_auto.py

      - name: 정치 커밋 & 푸시
        if: >
          github.event_name == 'workflow_dispatch' && (
            github.event.inputs.topic == 'all' ||
            github.event.inputs.topic == 'politics'
          ) ||
          github.event.schedule == '0 23 * * 0-4'
        run: |
          git add -A
          git diff --staged --quiet || git commit -m "정치 데일리 테제 $(date +'%Y.%m.%d') [자동]"
          git pull --rebase origin main
          git push

      # ── 컬처 (08:00만 실행) ────────────────────────────────────
      - name: 컬처 테제 생성
        if: >
          github.event_name == 'workflow_dispatch' && (
            github.event.inputs.topic == 'all' ||
            github.event.inputs.topic == 'culture'
          ) ||
          github.event.schedule == '0 23 * * 0-4'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          INDEXNOW_KEY: ${{ secrets.INDEXNOW_KEY }}
          GA4_ID: ${{ secrets.GA4_ID }}
          BING_VERIFY_KEY: ${{ secrets.BING_VERIFY_KEY }}
          TOPIC: culture
        run: python daily_auto.py

      - name: 컬처 커밋 & 푸시
        if: >
          github.event_name == 'workflow_dispatch' && (
            github.event.inputs.topic == 'all' ||
            github.event.inputs.topic == 'culture'
          ) ||
          github.event.schedule == '0 23 * * 0-4'
        run: |
          git add -A
          git diff --staged --quiet || git commit -m "컬처 데일리 테제 $(date +'%Y.%m.%d') [자동]"
          git pull --rebase origin main
          git push

      # ── 주간 다이제스트 (금요일 18:00 KST) ───────────────────
      - name: 주간 다이제스트 생성
        if: >
          github.event_name == 'workflow_dispatch' && github.event.inputs.topic == 'weekly' ||
          github.event.schedule == '0 9 * * 5'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          INDEXNOW_KEY: ${{ secrets.INDEXNOW_KEY }}
          GA4_ID: ${{ secrets.GA4_ID }}
          BING_VERIFY_KEY: ${{ secrets.BING_VERIFY_KEY }}
          TOPIC: weekly
        run: python daily_auto.py

      - name: 주간 다이제스트 커밋 & 푸시
        if: >
          github.event_name == 'workflow_dispatch' && github.event.inputs.topic == 'weekly' ||
          github.event.schedule == '0 9 * * 5'
        run: |
          git add -A
          git diff --staged --quiet || git commit -m "주간 다이제스트 $(date +'%Y-W%V') [자동]"
          git pull --rebase origin main
          git push

      # ── 발행 실패 텔레그램 알림 ────────────────────────────────
      - name: 🚨 발행 실패 알림
        if: failure()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python3 - <<'PYEOF'
          import os, json, urllib.request
          from datetime import datetime, timezone, timedelta

          KST = timezone(timedelta(hours=9))
          now = datetime.now(KST).strftime('%Y-%m-%d %H:%M')
          repo = os.environ.get('GITHUB_REPOSITORY', 'jayce0321/daily-thesis')
          run_id = os.environ.get('GITHUB_RUN_ID', '')
          run_url = f"https://github.com/{repo}/actions/runs/{run_id}"

          msg = (
              "🚨 데일리 테제 발행 실패\n\n"
              f"⏰ {now} KST\n"
              f"🔗 {run_url}\n\n"
              "위 링크에서 실패 단계를 확인하세요."
          )

          data = json.dumps({
              "chat_id": os.environ["TELEGRAM_CHAT_ID"],
              "text": msg,
              "disable_web_page_preview": True,
          }).encode("utf-8")

          req = urllib.request.Request(
              f"https://api.telegram.org/bot{os.environ['TELEGRAM_BOT_TOKEN']}/sendMessage",
              data=data,
              headers={"Content-Type": "application/json"}
          )
          try:
              urllib.request.urlopen(req, timeout=10)
              print("✅ 실패 알림 전송 완료")
          except Exception as e:
              print(f"⚠️ 실패 알림 전송 오류: {e}")
          PYEOF
