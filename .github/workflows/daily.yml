name: 데일리 테제 자동 발행

on:
  schedule:
    - cron: '0 23 * * 0-4'  # KST 08:00 월~금 (경제+정치+컬처)
    - cron: '0 6 * * 1-5'   # KST 15:00 월~금 (경제만)
  workflow_dispatch:
    inputs:
      topic:
        description: '발행할 토픽 (economy / politics / culture / all)'
        required: false
        default: 'all'

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: 레포 체크아웃
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Python 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 의존성 설치
        run: pip install requests beautifulsoup4

      - name: git 사용자 설정
        run: |
          git config user.name "jayce0321"
          git config user.email "jaehoyi0321@gmail.com"

      # ── 경제·투자 (08:00 + 15:00 모두 실행) ───────────────────
      - name: 경제·투자 테제 생성
        if: >
          github.event_name == 'workflow_dispatch' && (
            github.event.inputs.topic == 'all' ||
            github.event.inputs.topic == 'economy' ||
            github.event.inputs.topic == ''
          ) ||
          github.event_name == 'schedule'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TOPIC: economy
        run: python daily_auto.py

      - name: 경제·투자 커밋 & 푸시
        if: >
          github.event_name == 'workflow_dispatch' && (
            github.event.inputs.topic == 'all' ||
            github.event.inputs.topic == 'economy' ||
            github.event.inputs.topic == ''
          ) ||
          github.event_name == 'schedule'
        run: |
          git add -A
          git diff --staged --quiet || git commit -m "경제·투자 데일리 테제 $(date +'%Y.%m.%d %H:%M') [자동]"
          git push

      # ── 정치 (08:00만 실행) ────────────────────────────────────
      - name: 정치 테제 생성
        if: >
          github.event_name == 'workflow_dispatch' && (
            github.event.inputs.topic == 'all' ||
            github.event.inputs.topic == 'politics'
          ) ||
          github.event.schedule == '0 23 * * 0-4'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TOPIC: politics
        run: python daily_auto.py

      - name: 정치 커밋 & 푸시
        if: >
          github.event_name == 'workflow_dispatch' && (
            github.event.inputs.topic == 'all' ||
            github.event.inputs.topic == 'politics'
          ) ||
          github.event.schedule == '0 23 * * 0-4'
        run: |
          git add -A
          git diff --staged --quiet || git commit -m "정치 데일리 테제 $(date +'%Y.%m.%d') [자동]"
          git pull --rebase origin main
          git push

      # ── 컬처 (08:00만 실행) ────────────────────────────────────
      - name: 컬처 테제 생성
        if: >
          github.event_name == 'workflow_dispatch' && (
            github.event.inputs.topic == 'all' ||
            github.event.inputs.topic == 'culture'
          ) ||
          github.event.schedule == '0 23 * * 0-4'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TOPIC: culture
        run: python daily_auto.py

      - name: 컬처 커밋 & 푸시
        if: >
          github.event_name == 'workflow_dispatch' && (
            github.event.inputs.topic == 'all' ||
            github.event.inputs.topic == 'culture'
          ) ||
          github.event.schedule == '0 23 * * 0-4'
        run: |
          git add -A
          git diff --staged --quiet || git commit -m "컬처 데일리 테제 $(date +'%Y.%m.%d') [자동]"
          git pull --rebase origin main
          git push
